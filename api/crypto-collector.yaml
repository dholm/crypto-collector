openapi: 3.1.0
info:
  title: Crypto Collector API
  description: |
    REST API for the Crypto Collector microservice (SPEC-API-001, SPEC-API-002).
    Provides management of tracked coins, read access to spot quotes, OHLCV candles,
    coin metadata, and coin market aggregates. Real-time quote and candle streams are
    available via WebSocket.

    **Decimal encoding**: all monetary/quantity fields are JSON strings to
    preserve full precision (OR-API-2, REQ-API-073).

    **Pagination**: keyset cursors (opaque base64url, O(1)-deep, stable
    under concurrent inserts). Default page size: 100. Max: 1000.

    **live_poll_interval**: H/M/S duration string (e.g. "5m", "1h30m", "30s").
    Per-coin polling cadence override; null = use global default.
  version: 0.3.0
  contact:
    name: Crypto Collector team

servers:
  - url: /v1
    description: v1 API base

tags:
  - name: coins
    description: Tracked coin registry (base assets)
  - name: quotes
    description: Spot quote time-series (per coin)
  - name: candles
    description: OHLCV candle time-series (per coin)
  - name: streams
    description: Real-time WebSocket streams
  - name: metadata
    description: Coin metadata revisions
  - name: coin-market
    description: Coin market aggregate snapshots
  - name: cycle-overlay
    description: Bitcoin halving-cycle overlay (derived analytics)

paths:
  # ── Coin management ──────────────────────────────────────────────────────────

  /coins:
    get:
      operationId: listCoins
      tags: [coins]
      summary: List tracked coins (keyset-paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Paginated coin list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinPage'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      operationId: registerCoin
      tags: [coins]
      summary: Register a coin for tracking (idempotent)
      description: |
        Returns 201 on first registration, 200 if the coin_id already exists.
        Enqueues a metadata and market collection job on creation.
        Optional `live_poll_interval` sets per-coin polling cadence (H/M/S string).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCoinRequest'
      responses:
        '201':
          description: Coin registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coin'
        '200':
          description: Coin already registered (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /coins/search:
    get:
      operationId: searchCoins
      tags: [coins]
      summary: Search candidate coins to add (provider-backed, paced)
      description: |
        Calls the upstream provider (CoinGecko /search) to find coins matching
        the query. Requires a pacer slot; returns 503 if the slot is unavailable
        (provider cooldown, credit exhaustion, or timeout; REQ-API-080/081).
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query string
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Search results (up to 50 regardless of limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinSearchPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ── WebSocket streams (registered BEFORE /{coin_id} — REQ-API-148) ─────────

  /coins/stream/quotes:
    get:
      operationId: streamCoinQuotes
      tags: [streams]
      summary: WebSocket stream of live coin spot quotes
      description: |
        Upgrades to WebSocket (101). After connection, send subscribe/unsubscribe
        control frames to manage the subscription set.

        **Control frame** (client → server):
        ```json
        {"action": "subscribe",   "coin_id": "bitcoin"}
        {"action": "unsubscribe", "coin_id": "bitcoin"}
        ```

        **Push frame** (server → client, on each new quote):
        ```json
        {"coin_id": "bitcoin", "vs_currency": "usd", "price": "67123.45",
         "ts": "2024-01-15T12:00:00Z", "source": "binance"}
        ```

        **Error frame** (on malformed control message; connection stays open):
        ```json
        {"error": "invalid_message", "message": "..."}
        ```
      responses:
        '101':
          description: WebSocket upgrade successful
        '400':
          $ref: '#/components/responses/BadRequest'

  /coins/stream/candles:
    get:
      operationId: streamCoinCandles
      tags: [streams]
      summary: WebSocket stream of live coin OHLCV candles
      description: |
        Upgrades to WebSocket (101). After connection, send subscribe/unsubscribe
        control frames to manage the subscription set.

        **Control frame** (client → server):
        ```json
        {"action": "subscribe",   "coin_id": "bitcoin", "interval": "1m"}
        {"action": "unsubscribe", "coin_id": "bitcoin", "interval": "1m"}
        ```

        **Push frame** (server → client, on each new candle):
        ```json
        {"coin_id": "bitcoin", "vs_currency": "usd", "interval": "1m",
         "ts": "2024-01-15T12:00:00Z", "open": "67100.00", "high": "67200.00",
         "low": "67050.00", "close": "67123.45", "volume": null, "source": "binance"}
        ```

        Valid intervals: 1m, 5m, 15m, 1h, 4h, 1d, 1w
      responses:
        '101':
          description: WebSocket upgrade successful
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Parameterised coin routes (must come after literal /coins/* routes) ──────

  /coins/{coin_id}:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: getCoin
      tags: [coins]
      summary: Get a tracked coin by coin_id
      responses:
        '200':
          description: Coin found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coin'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateCoin
      tags: [coins]
      summary: Update mutable coin fields
      description: |
        `live_poll_interval` uses tri-state semantics:
        - **Absent** (field not in JSON): leave existing value unchanged
        - **null**: reset to global default (clear per-coin cadence)
        - **string** (e.g. "5m"): set new per-coin interval (422 if out of bounds)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCoinRequest'
      responses:
        '200':
          description: Updated coin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      operationId: deleteCoin
      tags: [coins]
      summary: Soft-deregister a coin (sets status = paused)
      responses:
        '204':
          description: Coin deregistered
        '404':
          $ref: '#/components/responses/NotFound'

  /coins/{coin_id}/metadata:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: getCoinMetadata
      tags: [metadata]
      summary: Get coin metadata (latest or as-of revision)
      description: |
        Without `as_of`: returns the latest revision (highest revision number).
        With `as_of`: returns the revision with the greatest `first_seen_at <= as_of`.
      parameters:
        - name: as_of
          in: query
          schema:
            type: string
            format: date-time
          description: Point-in-time for as-of revision lookup
      responses:
        '200':
          description: Coin metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinMetadata'
        '404':
          $ref: '#/components/responses/NotFound'

  /coins/{coin_id}/market/latest:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: getCoinMarketLatest
      tags: [coin-market]
      summary: Get the latest coin market snapshot
      parameters:
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
          description: Quote currency (e.g. usd, btc)
      responses:
        '200':
          description: Latest coin market snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinMarketSnapshot'
        '404':
          $ref: '#/components/responses/NotFound'

  /coins/{coin_id}/market:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: listCoinMarket
      tags: [coin-market]
      summary: List coin market snapshot history (keyset-paginated)
      parameters:
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: Paginated coin market snapshot history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinMarketSnapshotPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── All-coin latest-quote overview (SPEC-API-004 REQ-API-300..309) ───────────

  /coins/quotes/latest:
    get:
      operationId: listLatestCoinQuotes
      tags: [quotes]
      summary: All-coin latest-quote overview (current spot price + 24h baseline)
      description: >
        Returns, for every **active** tracked coin that has a current quote in
        the bounded window, one overview row carrying the coin's current spot
        price (`price`) and a nullable 24h-ago baseline (`open_24h`), in a single
        unpaginated snapshot. The response is a bare `{"quotes":[...]}` object —
        NOT the shared `Page{items,next_cursor}` wrapper — with no cursor and no
        `limit`. `open_24h` is `null` (never zero, never omitted) when the
        trailing 24h window holds no earlier quote. A coin with no quote in the
        last 48h is absent from the response. `vs_currency` defaults to `usd` and
        is not allow-list-validated — an unrecognised value yields `{"quotes":[]}`.
      parameters:
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
          description: Quote currency (default usd); unrecognised value yields an empty overview
      responses:
        '200':
          description: All-coin latest-quote overview (empty is `{"quotes":[]}`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinQuoteOverviewPage'

  # ── Coin spot quote endpoints (SPEC-API-002 REQ-API-120/121/122) ─────────────

  /coins/{coin_id}/quotes/latest:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: getLatestCoinQuote
      tags: [quotes]
      summary: Get the latest spot quote for a coin
      parameters:
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
          description: Quote currency (e.g. usd, btc)
      responses:
        '200':
          description: Latest spot quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinQuote'
        '404':
          $ref: '#/components/responses/NotFound'

  /coins/{coin_id}/quotes:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: listCoinQuotes
      tags: [quotes]
      summary: List spot quote history for a coin (keyset-paginated)
      parameters:
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: Paginated coin spot quote history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinQuotePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Coin OHLCV candle endpoints (SPEC-API-002 REQ-API-130/131/132) ────────────

  /coins/{coin_id}/candles:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: listCoinCandles
      tags: [candles]
      summary: List OHLCV candle history for a coin (keyset-paginated)
      description: >
        Returns OHLCV candles for the coin at the requested `interval`.


        When no candles are stored natively at the requested `interval`, the
        service aggregates them on the fly from the largest finer-grained stored
        interval that divides the target evenly (e.g. a 4h candle from four 1h
        candles). Aggregated candles carry `source` = `aggregated:<source_interval>`
        (e.g. `aggregated:1h`); natively-collected candles keep their provider
        source. Closed buckets missing any source candle are omitted (never
        interpolated); the single bucket whose window contains the current time
        is emitted as a live, still-forming candle. When no stored interval can
        compose the target, an empty page (HTTP 200) is returned.
      parameters:
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
          description: Candle interval (required; 400 if absent or invalid)
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
          description: >
            Quote currency to read/aggregate within (default `usd`). Native and
            aggregated results are both scoped to this currency; an unrecognised
            value is not a 400 and simply yields an empty page.
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: Paginated coin OHLCV candle history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinCandlePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Bitcoin halving-cycle overlay (SPEC-CYCLE-001, v0.6.0 parameterized + discovery) ──────

  /coins/{coin_id}/cycle-projection:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: listCycleProjectionModels
      tags: [cycle-overlay]
      summary: List the selectable cycle-projection models (discovery)
      description: >
        Returns the set of selectable `{model}` values accepted by
        `GET /coins/{coin_id}/cycle-projection/{model}`, so a client can discover valid
        models dynamically rather than hardcoding them (SPEC-CYCLE-001 v0.6.0,
        REQ-CYCLE-095/096). The response is coin-agnostic — the same two-model list is
        returned for any `coin_id`. `real` (the always-included baseline of the data
        endpoint) is never listed here — it is not a selectable model
        (REQ-CYCLE-093/097).
      responses:
        '200':
          description: The two selectable projection models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CycleProjectionModels'

  /coins/{coin_id}/cycle-projection/{model}:
    parameters:
      - $ref: '#/components/parameters/coin_id'
    get:
      operationId: listCycleProjection
      tags: [cycle-overlay]
      summary: List the Bitcoin halving-cycle overlay for a coin under the selected projection model (keyset-paginated)
      description: >
        Returns materialised halving-cycle overlay points derived locally from the
        coin's persisted daily (`1d`) candle history — never scraped from any external
        chart source and never fetched from a new upstream provider. Ordered by
        `(cycle_number ASC, days_since_halving ASC)`. Every point carries both
        normalization baselines: `norm_halving` (halving-day anchor = `1.0`) and
        `norm_cycle_low` (cycle low = `1.0`); both are plotted against the same
        `days_since_halving` X-axis (the cycle-low series is deliberately NOT
        re-based to days-since-low). The always-included `real` (observed) baseline is
        present regardless of `{model}`. A coin with no computed overlay (e.g. not the
        configured target coin) yields an empty page (HTTP 200), not 404
        (REQ-CYCLE-090/091/092).


        `{model}` selects the forward-projection method (see `projected` on each point):
        `replay` reproduces the Bitbo-style cycle-repeat projection — it replays the
        actual daily returns of the trailing one-halving-cycle reference window forward
        from today, scaled to today's real price, reproducing local swings more
        faithfully than a smooth trend model, at the cost of no statistical confidence
        bands (`price_low`/`price_high` are always null). `composite` uses a power-law
        trend fit of the coin's full daily history, plus a damped halving-cycle phase
        component (encoding measured diminishing returns), plus a mean-reversion term
        that keeps the path continuous with the last real close (half-life ~180 days);
        `price` is the median (P50) path and `price_low`/`price_high` carry the P10/P90
        confidence bands. `{model}` values other than `replay`/`composite` (including
        `real`, which is never a selectable model) return HTTP 400
        (REQ-CYCLE-093/094). This is a v0.6.0 replacement for the removed
        `GET /coins/{coin_id}/cycle-overlay` (formerly `replay`) and the former data
        body of the base `GET /coins/{coin_id}/cycle-projection` (formerly `composite`)
        — see REQ-CYCLE-098.
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
            enum: [replay, composite]
          description: >
            Selects the forward-projection method. `real` is never a selectable value —
            it is the always-included baseline of every response, and is unavailable as
            a `{model}` (returns HTTP 400).
        - name: vs_currency
          in: query
          schema:
            type: string
            default: usd
          description: Quote currency (default `usd`); unrecognised values yield an empty page.
        - name: cycle
          in: query
          schema:
            type: integer
            format: int32
          description: Optional filter to a single cycle ordinal (1 = 2012-11-28 halving, etc.).
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/cycle_as_of'
      responses:
        '200':
          description: Paginated halving-cycle overlay points under the selected model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CycleOverlayPointPage'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    coin_id:
      name: coin_id
      in: path
      required: true
      schema:
        type: string
      description: CoinGecko coin identifier (e.g. "bitcoin")

    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque keyset cursor from `next_cursor` of a previous page

    cycle_as_of:
      name: as_of
      in: query
      schema:
        type: string
        format: date-time
      description: >
        Optional point-in-time cutoff (RFC3339; SPEC-CYCLE-001 v0.5.0). When present, the
        response is computed on the fly from candle history truncated to `ts <= as_of` instead
        of the precomputed table, reproducing exactly what this endpoint would have returned
        at that instant. Intended for a two-call comparison: fetch once WITH `as_of` for the
        historical prediction and once WITHOUT for the actuals, then overlay both client-side.

    limit:
      name: limit
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 1000
        default: 100
      description: Number of items per page (default 100, max 1000)

    start:
      name: start
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive start of time range (ISO-8601 UTC)

    end:
      name: end
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive end of time range (ISO-8601 UTC)

  responses:
    BadRequest:
      description: Malformed request (invalid cursor, bad limit, unknown interval, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    UnprocessableEntity:
      description: Request is syntactically valid but semantically invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    ServiceUnavailable:
      description: Upstream provider unavailable (pacer cooldown, credit exhaustion, or timeout)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    # ── Shared ──────────────────────────────────────────────────────────────────

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: NOT_FOUND
        message:
          type: string
          description: Human-readable description
          example: coin 'bitcoin' not found

    Page:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: {}
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null when exhausted

    DecimalString:
      type: string
      description: |
        Arbitrary-precision decimal serialized as a JSON string.
        Example: "67123.456789", "0.00000000001234", "589000000000000".
      example: "67123.456789"

    # ── Coin schemas ─────────────────────────────────────────────────────────────

    Coin:
      type: object
      required: [coin_id, symbol, name, status, registered_at]
      properties:
        coin_id:
          type: string
          description: CoinGecko identifier
          example: bitcoin
        symbol:
          type: string
          example: btc
        name:
          type: string
          example: Bitcoin
        status:
          type: string
          enum: [active, paused, error]
        registered_at:
          type: string
          format: date-time
        last_collected_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        live_poll_interval:
          type: string
          nullable: true
          description: Per-coin polling cadence override as H/M/S string (e.g. "5m", "1h30m"); null = use global default
          example: "5m"

    CoinPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Coin'

    RegisterCoinRequest:
      type: object
      required: [coin_id, symbol, name]
      properties:
        coin_id:
          type: string
        symbol:
          type: string
        name:
          type: string
        live_poll_interval:
          type: string
          nullable: true
          description: Optional per-coin polling cadence (H/M/S string; 422 if out of bounds)
          example: "5m"

    UpdateCoinRequest:
      type: object
      description: |
        `live_poll_interval` is tri-state:
        - Absent from JSON: leave unchanged
        - `null`: reset to global default
        - String (e.g. "5m"): set new per-coin interval (422 if out of bounds)
      properties:
        status:
          type: string
          enum: [active, paused, error]
        error:
          type: string
          nullable: true
        live_poll_interval:
          type: string
          nullable: true
          description: Per-coin polling cadence override (H/M/S) or null to reset to global default

    CoinSearchResult:
      type: object
      required: [coin_id, symbol, name]
      properties:
        coin_id:
          type: string
        symbol:
          type: string
        name:
          type: string

    CoinSearchPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CoinSearchResult'

    # ── Coin spot quote schemas ──────────────────────────────────────────────────

    CoinQuote:
      type: object
      required: [coin_id, vs_currency, ts, price, source]
      properties:
        coin_id:
          type: string
          example: bitcoin
        vs_currency:
          type: string
          example: usd
        ts:
          type: string
          format: date-time
        price:
          $ref: '#/components/schemas/DecimalString'
        source:
          type: string
          example: binance

    CoinQuotePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CoinQuote'

    # ── All-coin latest-quote overview schemas (SPEC-API-004) ─────────────────────

    CoinQuoteOverview:
      type: object
      required: [coin_id, vs_currency, ts, price, source]
      description: >
        One active coin's current spot quote plus a 24h-ago baseline. `ts`/`price`/`source`
        describe the current quote; `open_24h` is the baseline price ~24h earlier.
      properties:
        coin_id:
          type: string
          example: bitcoin
        vs_currency:
          type: string
          example: usd
        ts:
          type: string
          format: date-time
        price:
          $ref: '#/components/schemas/DecimalString'
        open_24h:
          $ref: '#/components/schemas/DecimalString'
          nullable: true
          description: >
            Baseline price ~24h earlier (earliest quote in the trailing 24h window).
            `null` when the 24h window holds no earlier quote — never zero, never omitted.
        source:
          type: string
          example: binance

    CoinQuoteOverviewPage:
      type: object
      required: [quotes]
      description: >
        Bare all-coin overview envelope — a single unpaginated snapshot with one row per
        active coin. Deliberately NOT the shared `Page{items,next_cursor}` wrapper: no cursor,
        no `limit`. Empty result is `{"quotes":[]}`.
      properties:
        quotes:
          type: array
          items:
            $ref: '#/components/schemas/CoinQuoteOverview'

    # ── Coin OHLCV candle schemas ────────────────────────────────────────────────

    CoinCandle:
      type: object
      required: [coin_id, vs_currency, interval, ts, open, high, low, close, source]
      properties:
        coin_id:
          type: string
          example: bitcoin
        vs_currency:
          type: string
          example: usd
        interval:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
        ts:
          type: string
          format: date-time
        open:
          $ref: '#/components/schemas/DecimalString'
        high:
          $ref: '#/components/schemas/DecimalString'
        low:
          $ref: '#/components/schemas/DecimalString'
        close:
          $ref: '#/components/schemas/DecimalString'
        volume:
          $ref: '#/components/schemas/DecimalString'
          nullable: true
          description: >
            Nullable: some providers do not include per-candle volume. For
            aggregated candles the value is the sum of component volumes, or
            null if any component's volume is null.
        source:
          type: string
          example: binance
          description: >
            Provider name for natively-collected candles (e.g. `binance`), or
            `aggregated:<source_interval>` (e.g. `aggregated:1h`) when the candle
            was derived by aggregating a finer stored interval.

    CoinCandlePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CoinCandle'

    # ── Bitcoin halving-cycle overlay schemas (SPEC-CYCLE-001) ───────────────────

    CycleOverlayPoint:
      type: object
      required:
        - coin_id
        - vs_currency
        - cycle_number
        - halving_date
        - days_since_halving
        - ts
        - price
        - norm_halving
        - norm_cycle_low
        - halving_baseline_approximate
        - projected
      properties:
        coin_id:
          type: string
          example: bitcoin
        vs_currency:
          type: string
          example: usd
        cycle_number:
          type: integer
          format: int32
          description: >
            1 = 2012-11-28 halving, 2 = 2016-07-09, 3 = 2020-05-11, 4 = 2024-04-20 (open-ended
            for real data, REQ-CYCLE-012). Projected points (see `projected`) MAY carry
            cycle_number 5, assigned against an ESTIMATED 2028-04-20 halving used only to
            place projected points on the correct side of that future boundary
            (REQ-CYCLE-063); this never affects real-data cycle 4.
        halving_date:
          type: string
          format: date
        days_since_halving:
          type: integer
          format: int32
          description: Whole-day offset from the cycle's halving date; day 0 = halving date.
        ts:
          type: string
          format: date
          description: The `1d` candle date this point is derived from.
        price:
          $ref: '#/components/schemas/DecimalString'
          description: Raw daily `1d` close (D7).
        norm_halving:
          $ref: '#/components/schemas/DecimalString'
          description: price / price_on_halving_anchor — the anchor day is exactly "1".
        norm_cycle_low:
          $ref: '#/components/schemas/DecimalString'
          description: price / cycle_low_price — the cycle-low day is exactly "1".
        halving_baseline_approximate:
          type: boolean
          description: >
            true when the exact halving-date candle was absent and the anchor was
            forward-searched to the first available day (REQ-CYCLE-032).
        projected:
          type: boolean
          description: >
            true when this point is a forward projection rather than a real observed daily
            candle (REQ-CYCLE-060/063). Projected points span up to 1458 days forward, may
            cross into a projected cycle 5 (estimated 2028-04-20 halving), and are
            provisional — recomputed on every recompute tick as real data grows. Which
            projection model produced a given point depends on the `{model}` requested on
            `GET /coins/{coin_id}/cycle-projection/{model}` (v0.6.0, REQ-CYCLE-090):
            `replay` serves the Bitbo-style cycle-repeat REPLAY model (replays the trailing
            one-halving-cycle's actual daily returns forward from today, scaled to today's
            price; no confidence bands — `price_low`/`price_high` are always null).
            `composite` serves the COMPOSITE model (SPEC-CYCLE-001 v0.4.0,
            docs/prediction-research.md): a power-law trend fit of the coin's full daily
            history, plus a damped halving-cycle phase component (encoding measured
            diminishing returns), plus a mean-reversion term that keeps the path continuous
            with the last real close (half-life ~180 days); `price` is the median (P50)
            path, `price_low`/`price_high` carry the P10/P90 bands.
        price_low:
          allOf:
            - $ref: '#/components/schemas/DecimalString'
          nullable: true
          description: >
            P10 confidence band of the composite projection (REQ-CYCLE-064), derived from
            empirical horizon quantiles of the model's historical errors. Present only on
            projected points served by `{model}=composite`; null on real observed points
            and on all points served by `{model}=replay` (the replay model has no
            confidence bands).
        price_high:
          allOf:
            - $ref: '#/components/schemas/DecimalString'
          nullable: true
          description: >
            P90 confidence band of the composite projection (REQ-CYCLE-064). Present only
            on projected points served by `{model}=composite`; null on real observed
            points and on all points served by `{model}=replay` (the replay model has no
            confidence bands).

    CycleOverlayPointPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CycleOverlayPoint'

    CycleProjectionModel:
      type: object
      required:
        - id
        - description
        - has_confidence_bands
      properties:
        id:
          type: string
          enum: [replay, composite]
          description: The `{model}` path value accepted by the data endpoint.
        description:
          type: string
          description: Human-readable description of the projection model.
        has_confidence_bands:
          type: boolean
          description: >
            `true` for `composite` (carries P10/P90 `price_low`/`price_high`), `false`
            for `replay` (always null bands).

    CycleProjectionModels:
      type: object
      required:
        - models
      properties:
        models:
          type: array
          description: >
            Exactly two entries — `replay` and `composite`. `real` (the always-included
            baseline of the data endpoint) is never listed (REQ-CYCLE-097).
          items:
            $ref: '#/components/schemas/CycleProjectionModel'

